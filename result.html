<!doctype html>
<html lang="en">
<head>

</head>
<body>
  <main class="result-shell">
    <header class="result-hero" aria-live="polite">
      <div class="result-hero__copy">
        <p id="result-stamp" class="stamp">RESULT FILE</p>
        <p id="result-meta" class="result-meta">Loading</p>
        <h1 id="result-status">Loading result</h1>
        <p id="result-subtitle" class="result-subtitle">Reading the record.</p>
      </div>
      <aside class="share-panel" aria-label="Share result">
        <div class="share-row">
          <button id="copy-share" type="button" disabled>SHARE YOUR RESULT</button>
        </div>
      </aside>
    </header>

    <section id="result-errors" class="errors" aria-live="polite"></section>
    <article id="result-content" class="result" hidden></article>
    <nav id="demo-links" class="demo-links" aria-label="Fixture links"></nav>
  </main>

  <script src="v2-candidates/dramaturgical-router/data/leader-comparison-data.js"></script>
